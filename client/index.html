<!doctype html>
<html lang="en">
  <head>
    <style>
      html {
        font-size: 18px;
      }

      body {
        font-size: 1rem;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
      }

      #root {
        width: 100%;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      h1 {
        font-size: 2.5rem;
      }

      p {
        font-size: 1.1rem;
      }

      .calculator-container {
        width: 90%;
        max-width: 600px;
        padding: 20px;
        box-sizing: border-box;
        margin: 0 auto;
      }
    </style>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />

    <!-- Primary SEO Meta Tags -->
    <title>
      Hydration Calculator – Calculate Your Daily Water Intake | Free Tool
    </title>
    <meta
      name="description"
      content="Use our free Hydration Calculator to find out how much water you should drink per day. Based on your weight, activity level, climate, age, and gender. Fast and accurate daily water intake calculator."
    />
    <meta
      name="keywords"
      content="hydration calculator, water intake calculator, daily water intake, how much water should I drink, water calculator, drink water calculator, daily water goal, glasses of water per day, hydration needs calculator"
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://hydrationcalculator.replit.app/" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hydrationcalculator.replit.app/" />
    <meta
      property="og:title"
      content="Hydration Calculator – Calculate Your Daily Water Intake"
    />
    <meta
      property="og:description"
      content="Free online hydration calculator. Find your daily water intake needs based on weight, activity, climate, age, and gender. Fast, easy, and accurate."
    />
    <meta
      property="og:image"
      content="https://hydrationcalculator.replit.app/og-image.png"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Hydration Calculator – Daily Water Intake Calculator"
    />
    <meta
      name="twitter:description"
      content="Calculate how much water you need daily. Free hydration calculator based on weight, activity, climate, and more."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />

    <!-- FAQ Schema Markup -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How much water should I drink per day?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Most healthy adults need between 2 and 3.5 liters of water daily. The exact amount depends on weight, activity level, climate, and personal health. Use our free hydration calculator to get a personalized recommendation."
            }
          },
          {
            "@type": "Question",
            "name": "How is daily water intake calculated?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The standard formula multiplies your body weight (in kg) by 0.033 to estimate your base daily water needs in liters. Adjustments are then made for activity, climate, gender, age, and special conditions like pregnancy."
            }
          },
          {
            "@type": "Question",
            "name": "Does activity level affect hydration needs?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Physical activity increases sweat production and fluid loss. Someone who exercises heavily may need up to 1 extra liter of water per day compared to a sedentary person of the same weight."
            }
          },
          {
            "@type": "Question",
            "name": "Does hot weather increase water needs?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. In hot or humid climates, your body sweats more to regulate temperature, increasing your daily water requirement by up to 1 liter or more depending on heat intensity."
            }
          },
          {
            "@type": "Question",
            "name": "How many glasses of water should I drink daily?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Based on a standard 250ml glass, most adults need 8 to 14 glasses per day. Our calculator shows your exact glass count, cups, milliliters, and liters based on your personal data."
            }
          },
          {
            "@type": "Question",
            "name": "Is this hydration calculator accurate?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "It provides a reliable estimate based on well-established formulas used in nutrition science. Results are general guidelines, not medical prescriptions. Consult a healthcare provider for specific medical guidance."
            }
          }
        ]
      }
    </script>

    <!-- WebSite Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Hydration Calculator",
        "url": "https://hydrationcalculator.replit.app/",
        "description": "Free online hydration calculator to help you find your daily water intake needs.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://hydrationcalculator.replit.app/calculator",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
